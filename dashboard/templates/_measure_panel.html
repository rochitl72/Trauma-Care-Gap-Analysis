      <section class="panel measure-panel">
        <h2>Distance scale</h2>
        <p class="panel-note">Click two points on the map to measure straight-line and road distance (OSRM).</p>
        <label class="toggle">
          <input type="checkbox" id="measure-toggle" />
          <span>Measure tool</span>
        </label>
        <div id="measure-status" class="radar-status measure-status">Off — enable, then click two points.</div>
        <div id="measure-results" class="measure-results hidden">
          <dl>
            <dt>Straight line</dt>
            <dd id="measure-straight">—</dd>
            <dt>Road distance</dt>
            <dd id="measure-road">—</dd>
            <dt>Drive time</dt>
            <dd id="measure-duration">—</dd>
          </dl>
        </div>
        <button type="button" id="measure-clear" class="btn-ghost measure-clear" disabled>Clear measurement</button>
      </section>
