server {
    listen 80;
    server_name tcg.coers.in;

    # Accident CSV uploads (dataset_manager.py) need more than nginx's 1MB
    # default, and the grid/road analyses can legitimately run for a while
    # on first load per district — match the timeouts to what the app
    # actually does instead of nginx's defaults.
    client_max_body_size 20m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://backend:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
